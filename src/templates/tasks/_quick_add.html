<form hx-post="{% url 'action_create' %}"
      hx-target="#action-list"
      hx-swap="afterbegin"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="flex items-stretch gap-3 mb-6">
    {% csrf_token %}
    {% if default_status %}<input type="hidden" name="status" value="{{ default_status }}">{% endif %}
    {{ form.title }}
    <button type="submit"
            class="shrink-0 rounded-lg bg-blue-600 px-6 py-3.5 text-[17px] font-semibold text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-500/40">
        Add
    </button>
</form>
