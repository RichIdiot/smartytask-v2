<li id="action-{{ a.pk }}"
    class="group flex items-start gap-3 px-4 md:px-5 py-4 hover:bg-slate-50 border-b border-slate-200 last:border-b-0">

    <button type="button"
            hx-post="{% url 'action_complete' a.pk %}"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            hx-target="#action-{{ a.pk }}"
            hx-swap="outerHTML"
            class="mt-1 h-7 w-7 shrink-0 rounded-full border-2 border-slate-300 hover:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-500/30 flex items-center justify-center {% if a.completed_at %}bg-emerald-500 border-emerald-500{% endif %}"
            title="Mark complete"
            aria-label="Mark complete">
        {% if a.completed_at %}
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.7 5.3a1 1 0 010 1.4l-7.2 7.2a1 1 0 01-1.4 0L3.3 9.1a1 1 0 011.4-1.4L8.8 11.7l6.5-6.4a1 1 0 011.4 0z"/></svg>
        {% endif %}
    </button>

    <div class="flex-1 min-w-0">
        <div class="text-[17px] text-slate-900 {% if a.completed_at %}line-through text-slate-400{% endif %}"
             hx-get="{% url 'action_edit' a.pk %}"
             hx-target="#action-{{ a.pk }}"
             hx-swap="outerHTML"
             role="button"
             tabindex="0"
             title="Click to edit">
            {{ a.title }}
        </div>
        {% if a.context or a.project or a.due_date %}
        <div class="mt-1 flex flex-wrap gap-2 text-[14px] text-slate-500">
            {% if a.context %}<span class="inline-flex items-center gap-1 rounded-full bg-slate-100 px-2.5 py-0.5">@{{ a.context.title }}</span>{% endif %}
            {% if a.project %}<span class="inline-flex items-center gap-1 rounded-full bg-blue-50 text-blue-700 px-2.5 py-0.5">{{ a.project.title }}</span>{% endif %}
            {% if a.due_date %}<span class="inline-flex items-center gap-1 rounded-full bg-amber-50 text-amber-800 px-2.5 py-0.5">Due {{ a.due_date|date:"M j" }}</span>{% endif %}
        </div>
        {% endif %}
    </div>

    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
        <button type="button"
                hx-post="{% url 'action_toggle_star' a.pk %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-target="#action-{{ a.pk }}"
                hx-swap="outerHTML"
                class="h-10 w-10 rounded-md hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/40 {% if a.starred %}text-amber-500{% else %}text-slate-400{% endif %}"
                title="Star"
                aria-label="Star">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path d="M10 1l2.6 5.6 6.2.6-4.6 4.3 1.3 6L10 14.8 4.5 17.5l1.3-6L1.2 7.2l6.2-.6L10 1z"/></svg>
        </button>
        {% if a.status == 'inbox' %}
        <button type="button"
                hx-post="{% url 'action_move_to_next' a.pk %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-target="#action-{{ a.pk }}"
                hx-swap="outerHTML"
                class="h-10 px-3 rounded-md text-[14px] font-medium text-blue-700 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-500/40"
                title="Process: move to Next Actions">
            Process →
        </button>
        {% endif %}
        <button type="button"
                hx-post="{% url 'action_delete' a.pk %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-target="#action-{{ a.pk }}"
                hx-swap="outerHTML"
                hx-confirm="Delete this action?"
                class="h-10 w-10 rounded-md text-slate-400 hover:bg-rose-50 hover:text-rose-600 focus:outline-none focus:ring-2 focus:ring-rose-500/40"
                title="Delete"
                aria-label="Delete">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 100 2h12a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM4 8v8a2 2 0 002 2h8a2 2 0 002-2V8H4zm3 2a1 1 0 012 0v6a1 1 0 11-2 0v-6zm5-1a1 1 0 00-1 1v6a1 1 0 102 0v-6a1 1 0 00-1-1z"/></svg>
        </button>
    </div>
</li>
